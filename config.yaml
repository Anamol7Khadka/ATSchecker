  # Adzuna API (free — register at https://developer.adzuna.com/)
  # adzuna_app_id: "YOUR_APP_ID"
  # adzuna_app_key: "YOUR_APP_KEY"

  # Jooble API (free — register at https://jooble.org/api/about)
